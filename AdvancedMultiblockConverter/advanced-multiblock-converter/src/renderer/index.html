<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Multiblock Converter</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #2b2b2b;
      color: #eee;
      margin: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 15px;
      background: #3c3c3c;
      border: 1px solid #555;
      border-radius: 4px;
      color: #eee;
      cursor: pointer;
    }

    button:hover {
      background: #505050;
    }

    .code-container {
      width: 100%;
      height: 300px;
      overflow: auto;
      border: 1px solid #444;
      border-radius: 6px;
      background: #1e1e1e;
      margin-bottom: 20px;
      font-family: 'Fira Code', monospace;
    }

    pre {
      margin: 0;
      white-space: pre;
    }

    code {
      display: block;
      padding: 8px;
      color: #ddd;
      min-height: 280px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
